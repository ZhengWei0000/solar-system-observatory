<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="512" viewBox="0 0 1024 512" preserveAspectRatio="none" aria-label="neptune clouds texture">
  <defs>
    <filter id="clouds">
      <feTurbulence type="fractalNoise" baseFrequency="0.6 0.03" numOctaves="4" seed="6"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="table" tableValues="0.93 1"/>
        <feFuncG type="table" tableValues="0.93 1"/>
        <feFuncB type="table" tableValues="0.96 1"/>
        <feFuncA type="table" tableValues="0 0.42"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" opacity="0"/>
  <rect width="100%" height="100%" filter="url(#clouds)"/>
</svg>
