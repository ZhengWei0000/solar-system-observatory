version: "3.9"

services:
  solar-system-observatory:
    image: solar-system-observatory:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: solar-system-observatory
    restart: unless-stopped
    env_file:
      - ../../.env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "http = require('http'); http.get('http://127.0.0.1:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 20s
