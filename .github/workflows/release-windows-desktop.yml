name: Build and release Windows desktop app

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js and package desktop app
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: pnpm run desktop:build

      - name: List generated installers
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path dist-desktop | Select-Object FullName, Length | Format-Table

      - name: Upload artifacts to workflow
        uses: actions/upload-artifact@v4
        with:
          name: solar-system-observatory-desktop
          path: dist-desktop
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-desktop/*.exe
          generate_release_notes: false
